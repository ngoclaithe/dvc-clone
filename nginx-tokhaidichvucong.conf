server {
    listen 80;
    server_name tokhaidichvucong.com www.tokhaidichvucong.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tokhaidichvucong.com www.tokhaidichvucong.com;

    ssl_certificate /etc/letsencrypt/live/tokhaidichvucong.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tokhaidichvucong.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Upload size (match multer 10MB + overhead)
    client_max_body_size 15M;

    # Forward real IP + User-Agent
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header User-Agent $http_user_agent;

    # Main app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Socket.IO - WebSocket support
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Image uploads - serve directly from disk
    location /data/uploads/ {
        alias /home/ubuntu/dvc-clone/data/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri @backend;
    }

    location @backend {
        proxy_pass http://127.0.0.1:3000;
    }

    # Static assets cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
}
